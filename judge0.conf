# Judge0 Configuration File
# ========================================

# PostgreSQL Configuration
POSTGRES_HOST=judge0-db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0password

# Redis Configuration
REDIS_HOST=judge0-redis
REDIS_PORT=6379

# Worker Configuration
RAILS_ENV=production
SECRET_KEY_BASE=your-secret-key-base-change-in-production

# Execution Configuration
# Network is DISABLED by default for security
# User can enable it per-submission with enable_network: true
ENABLE_NETWORK=false
ENABLE_ADDITIONAL_FILES=false

# Resource Limits
CPU_TIME_LIMIT=5
CPU_EXTRA_TIME=1
WALL_TIME_LIMIT=10
MEMORY_LIMIT=128000
STACK_LIMIT=64000
MAX_PROCESSES_AND_OR_THREADS=60
ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=false
ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=false

# Output Limits
MAX_FILE_SIZE=1024
NUMBER_OF_RUNS=1

# Callbacks (disabled for our use case)
CALLBACKS_MAX_TRIES=3
CALLBACKS_TIMEOUT=5

# Maintenance mode
MAINTENANCE_MODE=false

# Enable wait endpoint
ENABLE_WAIT_RESULT=true
